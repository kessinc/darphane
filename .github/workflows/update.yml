name: Darphane Otomatik Veri Güncelleyici

on:
  schedule:
    - cron: "45 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  guncelle_ve_kaydet:
    runs-on: ubuntu-latest
    steps:
      - name: Kodları Çek
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Bağımlılıkları Kur
        run: |
          python -m pip install --upgrade pip
          pip install requests holidays

      - name: Darphane Motorunu Çalıştır
        run: python main.py

      - name: Değişiklikleri GitHub'a Kaydet
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add kurlar.json altin.json tatiller.json mevzuat.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Otomatik Güncelleme: $(date +'%Y-%m-%d %H:%M:%S')" && git push)
